description: Resolves asset dependency issue by adding google-cloud-org-policy
url: https://github.com/googleapis/google-cloud-python/issues/17152
replacements:
  - paths: [
      packages/google-cloud-asset/setup.py
    ]
    before: |
      dependencies = \[
          "google-api-core\[grpc\] >= 2.24.2, <3.0.0",
          # Exclude incompatible versions of `google-auth`
          # See https://github.com/googleapis/google-cloud-python/issues/12364
          "google-auth >= 2.14.1, <3.0.0,!=2.24.0,!=2.25.0",
          "grpcio >= 1.59.0, < 2.0.0",
    after:  |
      dependencies = [
          "google-api-core[grpc] >= 2.24.2, <3.0.0",
          # Exclude incompatible versions of `google-auth`
          # See https://github.com/googleapis/google-cloud-python/issues/12364
          "google-auth >= 2.14.1, <3.0.0,!=2.24.0,!=2.25.0",
          "google-cloud-org-policy >= 1.13.1, <2.0.0",
          "grpcio >= 1.59.0, < 2.0.0",

    count: 1
  - paths: [
      packages/google-cloud-asset/testing/constraints-3.10.txt
    ]
    before: |
      google-api-core==2.24.2
      google-auth==2.14.1
    after: |
      google-api-core==2.24.2
      google-cloud-org-policy==1.13.1
      google-auth==2.14.1
    count: 1
