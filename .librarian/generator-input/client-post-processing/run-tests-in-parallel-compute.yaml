description: Run tests in parallel to debug generation issue
url: https://github.com/googleapis/google-cloud-python/issues/14992
replacements:
  - paths: [
      packages/google-cloud-compute/noxfile.py,
    ]
    before: |
      "pytest-asyncio",
      \]
    after: |
      "pytest-asyncio",
          "pytest-xdist",
      ]
    count: 1
  - paths: [
      packages/google-cloud-compute/noxfile.py,
    ]
    before: |
      session.install\("protobuf<4"\)
      \
      \    # Run py.test against the unit tests.
      \    session.run\(
      \        "py.test",
      \        "--quiet",
    after: |
      session.install("protobuf<4")\n
          import os
          import faulthandler
          import sys
          os.environ['export PYTHONFAULTHANDLER'] = "1"
          import subprocess

          python_binary = f"{session.bin}/python"
          # Define the command as a list of strings
          command = [
              "gdb", 
              "-batch", 
              "-ex", "run", 
              "-ex", "bt", 
              "--args", 
              python_binary,
              "-m", "pytest",
              "-n", "auto",
              "--max-worker-restart", "0",
              "tests/unit/gapic/compute_v1/test_instances.py::test_update_rest_call_success[dict]", 
              "-v"
          ]

          try:
              # Run the command
              result = subprocess.run(
                  command,
                  capture_output=True, # Captures stdout and stderr
                  text=True,           # Returns output as string instead of bytes
                  check=True           # Raises an error if the command fails
              )

              # Print the output
              print("--- GDB Output ---")
              print(result.stdout)

          except subprocess.CalledProcessError as e:
              print(f"Command failed with return code {e.returncode}")
              print(f"Error output:\n{e.stderr}")
              print(f"Standard output:\n{e.stdout}")
              concurrent_args = ["-n", "auto", "--max-worker-restart", "0"]\n
              # Run py.test against the unit tests.
              session.run(
                  "py.test",
                  "-W",
                  "ignore::DeprecationWarning",
    count: 1
  - paths: [
      packages/google-cloud-compute/noxfile.py,
    ]
    before: |
        \*session.posargs,
        \        env=\{
    after: |
        *session.posargs,
                *concurrent_args,
                env={
    count: 1

