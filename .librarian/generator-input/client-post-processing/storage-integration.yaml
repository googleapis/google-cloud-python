      import io
      import json
      import os


      def _read_local_json(json_file):
          here = os.path.dirname(__file__)
          json_path = os.path.abspath(os.path.join(here, json_file))
          with io.open(json_path, "r", encoding="utf-8-sig") as fileobj:
              return json.load(fileobj)
