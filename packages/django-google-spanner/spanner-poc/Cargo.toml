[package]
name = "spanner-poc"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "Rust native extension for Spanner high-throughput gRPC GIL-release POC"

[lib]
name = "spanner_poc"
crate-type = ["cdylib"]

[dependencies]
# PyO3 bindings with stable ABI support
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py39"] }

# Async and gRPC execution stack
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.12", features = ["tls", "tls-native-roots"] }
prost = "0.13"
prost-types = "0.13"

# Thread-safe lazy initialization
once_cell = "1"

[build-dependencies]
tonic-build = "0.12"
