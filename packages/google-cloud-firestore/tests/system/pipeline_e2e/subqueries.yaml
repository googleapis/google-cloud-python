tests:
  - description: array_subquery_with_variable
    pipeline:
      - Collection: books
      - Where:
          - FunctionExpression.equal:
              - Field: title
              - Constant: "1984"
      - Define:
          - AliasedExpression:
              - Field: genre
              - target_genre
      - AddFields:
          - AliasedExpression:
              - Pipeline.to_array_expression:
                  - Collection: books
                  - Where:
                      - FunctionExpression.equal:
                          - Field: genre
                          - Variable: target_genre
                  - Select:
                      - Field: title
              - same_genre_books
      - Select:
          - Field: title
          - Field: same_genre_books
    assert_results:
      - title: "1984"
        same_genre_books:
          - "1984"
          - "The Handmaid's Tale"
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - args:
          - functionValue:
              args:
              - fieldReferenceValue: title
              - stringValue: '1984'
              name: equal
          name: where
        - args:
          - mapValue:
              fields:
                target_genre:
                  fieldReferenceValue: genre
          name: let
        - args:
          - mapValue:
              fields:
                same_genre_books:
                  functionValue:
                    args:
                    - pipelineValue:
                        stages:
                        - args:
                          - referenceValue: /books
                          name: collection
                        - args:
                          - functionValue:
                              args:
                              - fieldReferenceValue: genre
                              - variableReferenceValue: target_genre
                              name: equal
                          name: where
                        - args:
                          - mapValue:
                              fields:
                                title:
                                  fieldReferenceValue: title
                          name: select
                    name: array
          name: add_fields
        - args:
          - mapValue:
              fields:
                same_genre_books:
                  fieldReferenceValue: same_genre_books
                title:
                  fieldReferenceValue: title
          name: select

  - description: scalar_subquery_with_current_document
    pipeline:
      - Collection: books
      - Where:
          - FunctionExpression.equal:
              - Field: title
              - Constant: "1984"
      - Define:
          - AliasedExpression:
              - CurrentDocument:
              - doc
      - AddFields:
          - AliasedExpression:
              - Pipeline.to_scalar_expression:
                  - Collection: books
                  - Where:
                      - FunctionExpression.equal:
                          - Field: genre
                          - FunctionExpression.map_get:
                              - Variable: doc
                              - Constant: "genre"
                  - Aggregate:
                      - AliasedExpression:
                          - FunctionExpression.average:
                              - Field: rating
                          - avg_rating
              - average_rating
      - Select:
          - Field: title
          - Field: average_rating
    assert_results:
      - title: "1984"
        average_rating: 4.15
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - args:
          - functionValue:
              args:
              - fieldReferenceValue: title
              - stringValue: '1984'
              name: equal
          name: where
        - args:
          - mapValue:
              fields:
                doc:
                  functionValue:
                    name: current_document
          name: let
        - args:
          - mapValue:
              fields:
                average_rating:
                  functionValue:
                    args:
                    - pipelineValue:
                        stages:
                        - args:
                          - referenceValue: /books
                          name: collection
                        - args:
                          - functionValue:
                              args:
                              - fieldReferenceValue: genre
                              - functionValue:
                                  args:
                                  - variableReferenceValue: doc
                                  - stringValue: genre
                                  name: map_get
                              name: equal
                          name: where
                        - args:
                          - mapValue:
                              fields:
                                avg_rating:
                                  functionValue:
                                    args:
                                    - fieldReferenceValue: rating
                                    name: average
                          - mapValue: {}
                          name: aggregate
                    name: scalar
          name: add_fields
        - args:
          - mapValue:
              fields:
                average_rating:
                  fieldReferenceValue: average_rating
                title:
                  fieldReferenceValue: title
          name: select

  - description: scalar_subquery_multiple_items_error
    pipeline:
      - Collection: books
      - Limit: 1
      - AddFields:
          - AliasedExpression:
              - Pipeline.to_scalar_expression:
                  - Collection: books
              - bad_scalar
    assert_error: ".*more than one item.*"
