tests:
  - description: array_subquery_with_variable
    pipeline:
      - Collection: books
      - Where:
          - FunctionExpression.equal:
              - Field: title
              - Constant: "1984"
      - Define:
          - AliasedExpression:
              - Field: genre
              - target_genre
      - AddFields:
          - AliasedExpression:
              - Pipeline.to_array_expression:
                  - Collection: books
                  - Where:
                      - FunctionExpression.equal:
                          - Field: genre
                          - Variable: target_genre
                  - Select:
                      - Field: title
              - same_genre_books
      - Select:
          - Field: title
          - Field: same_genre_books
    assert_results:
      - title: "1984"
        same_genre_books:
          - "1984"
          - "The Handmaid's Tale"

  - description: scalar_subquery_with_current_document
    pipeline:
      - Collection: books
      - Where:
          - FunctionExpression.equal:
              - Field: title
              - Constant: "1984"
      - Define:
          - AliasedExpression:
              - CurrentDocument:
              - doc
      - AddFields:
          - AliasedExpression:
              - Pipeline.to_scalar_expression:
                  - Collection: books
                  - Where:
                      - FunctionExpression.equal:
                          - Field: genre
                          - FunctionExpression.map_get:
                              - Variable: doc
                              - Constant: "genre"
                  - Aggregate:
                      - AliasedExpression:
                          - FunctionExpression.average:
                              - Field: rating
                          - avg_rating
              - average_rating
      - Select:
          - Field: title
          - Field: average_rating
    assert_results:
      - title: "1984"
        average_rating: 4.15
