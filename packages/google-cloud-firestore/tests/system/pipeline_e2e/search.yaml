tests:
- description: search_stage_basic
  pipeline:
  - Collection: restaurants
  - Search:
    - SearchOptions:
        query: waffles
        limit: 2
  assert_results:
  - name: The Golden Waffle
    description: Specializing exclusively in Belgian-style waffles. Open daily from
      6:00 AM to 11:00 AM.
    location: GEOPOINT(39.7183, -104.9621)
    menu: <h3>Signature Waffles</h3><ul><li>Strawberry Delight - $11</li><li>Chicken
      and Waffles - $14</li><li>Chocolate Chip Crunch - $10</li></ul><h3>Drinks</h3><ul><li>Fresh
      OJ - $4</li><li>Artisan Coffee - $3</li></ul>
    average_price_per_person: 13
  assert_proto:
    pipeline:
      stages:
      - args:
        - referenceValue: /restaurants
        name: collection
      - name: search
        options:
          limit:
            integerValue: '2'
          query:
            functionValue:
              args:
              - stringValue: waffles
              name: document_matches
- description: search_stage_full_options
  pipeline:
  - Collection: restaurants
  - Search:
    - SearchOptions:
        query:
          DocumentMatches:
          - Constant: tacos
        limit: 5
        retrieval_depth: 10
        offset: 1
        query_enhancement: disabled
        language_code: en
  assert_proto:
    pipeline:
      stages:
      - args:
        - referenceValue: /restaurants
        name: collection
      - name: search
        options:
          limit:
            integerValue: '5'
          retrieval_depth:
            integerValue: '10'
          offset:
            integerValue: '1'
          query_enhancement:
            stringValue: disabled
          language_code:
            stringValue: en
          query:
            functionValue:
              args:
              - stringValue: tacos
              name: document_matches
  assert_count: 1
- description: search_stage_with_sort_and_add_fields
  pipeline:
  - Collection: restaurants
  - Search:
    - SearchOptions:
        query: tacos
        sort:
          Ordering:
          - Score: []
          - DESCENDING
        add_fields:
        - AliasedExpression:
          - Score: []
          - search_score
  - Select:
    - name
    - search_score
  assert_results_approximate:
    config:
      # be flexible in score values, but should be > 0
      absolute_tolerance: 0.99
    data:
    - name: Eastside Cantina
      search_score: 1.0
    - name: El Sol Tacos
      search_score: 1.0
  assert_proto:
    pipeline:
      stages:
      - name: collection
        args:
        - referenceValue: /restaurants
      - name: search
        options:
          query:
            functionValue:
              name: document_matches
              args:
              - stringValue: tacos
          sort:
            arrayValue:
              values:
              - mapValue:
                  fields:
                    direction:
                      stringValue: descending
                    expression:
                      functionValue:
                        name: score
          add_fields:
            mapValue:
              fields:
                search_score:
                  functionValue:
                    name: score
      - name: select
        args:
        - mapValue:
            fields:
              name:
                fieldReferenceValue: name
              search_score:
                fieldReferenceValue: search_score
- description: expression_between
  pipeline:
  - Collection: restaurants
  - Where:
    - FunctionExpression.between:
      - Field: average_price_per_person
      - Constant: 15
      - Constant: 20
  - Select:
    - name
  - Sort:
    - Ordering:
      - Field: name
      - ASCENDING
  assert_results:
  - name: Eastside Cantina
  - name: Peak Burgers
  - name: The Sunny Side Up
  assert_proto:
    pipeline:
      stages:
      - args:
        - referenceValue: /restaurants
        name: collection
      - args:
        - functionValue:
            args:
            - functionValue:
                args:
                - fieldReferenceValue: average_price_per_person
                - integerValue: '15'
                name: greater_than_or_equal
            - functionValue:
                args:
                - fieldReferenceValue: average_price_per_person
                - integerValue: '20'
                name: less_than_or_equal
            name: and
        name: where
      - args:
        - mapValue:
            fields:
              name:
                fieldReferenceValue: name
        name: select
      - args:
        - mapValue:
            fields:
              direction:
                stringValue: ascending
              expression:
                fieldReferenceValue: name
        name: sort
- description: expression_geo_distance
  pipeline:
  - Collection: restaurants
  - Search:
    - SearchOptions:
        query:
          FunctionExpression.less_than_or_equal:
          - FunctionExpression.geo_distance:
            - Field: location
            - GeoPoint:
              - 39.6985
              - -105.024
          - Constant: 1000.0
  - Select:
    - name
  - Sort:
    - Ordering:
      - Field: name
      - ASCENDING
  assert_results:
  - name: El Sol Tacos
  assert_proto:
    pipeline:
      stages:
      - args:
        - referenceValue: /restaurants
        name: collection
      - name: search
        options:
          query:
            functionValue:
              args:
              - functionValue:
                  args:
                  - fieldReferenceValue: location
                  - geoPointValue:
                      latitude: 39.6985
                      longitude: -105.024
                  name: geo_distance
              - doubleValue: 1000.0
              name: less_than_or_equal
      - args:
        - mapValue:
            fields:
              name:
                fieldReferenceValue: name
        name: select
      - args:
        - mapValue:
            fields:
              direction:
                stringValue: ascending
              expression:
                fieldReferenceValue: name
        name: sort
- description: search_stage_with_select_score
  pipeline:
  - Collection: restaurants
  - Search:
    - SearchOptions:
        query: tacos
        select:
        - AliasedExpression:
          - Score: []
          - search_score
  assert_proto:
    pipeline:
      stages:
      - name: collection
        args:
        - referenceValue: /restaurants
      - name: search
        options:
          query:
            functionValue:
              name: document_matches
              args:
              - stringValue: tacos
          select:
            mapValue:
              fields:
                search_score:
                  functionValue:
                    name: score
  assert_results_approximate:
    config:
      absolute_tolerance: 0.99
    data:
    - search_score: 1.0
    - search_score: 1.0
