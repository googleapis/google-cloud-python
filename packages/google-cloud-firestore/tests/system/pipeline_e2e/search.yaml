tests:
  - description: search_stage_basic
    pipeline:
      - Collection: books
      - Search:
          - SearchOptions:
              query: "science"
              limit: 2
    assert_results:
      - title: "Dune"
        author: "Frank Herbert"
        genre: "Science Fiction"
        published: 1965
        rating: 4.6
        tags:
          - politics
          - desert
          - adventure
        awards:
          hugo: true
          nebula: true
      - title: "The Hitchhiker's Guide to the Galaxy"
        author: "Douglas Adams"
        genre: "Science Fiction"
        published: 1979
        rating: 4.2
        tags:
          - comedy
          - space
          - adventure
        awards:
          hugo: true
          nebula: false
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - name: search
          options:
            limit:
              integerValue: '2'
            query:
              functionValue:
                args:
                - stringValue: "science"
                name: document_matches
  - description: search_stage_full_options
    pipeline:
      - Collection: books
      - Search:
          - SearchOptions:
              query:
                DocumentMatches:
                  - Constant: "science"
              limit: 5
              retrieval_depth: 10
              offset: 1
              query_enhancement: disabled
              language_code: en
    assert_results:
      - title: "The Hitchhiker's Guide to the Galaxy"
        author: "Douglas Adams"
        genre: "Science Fiction"
        published: 1979
        rating: 4.2
        tags:
          - comedy
          - space
          - adventure
        awards:
          hugo: true
          nebula: false
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - name: search
          options:
            limit:
              integerValue: '5'
            retrieval_depth:
              integerValue: '10'
            offset:
              integerValue: '1'
            query_enhancement:
              stringValue: "disabled"
            language_code:
              stringValue: "en"
            query:
              functionValue:
                args:
                - stringValue: "science"
                name: document_matches
  - description: search_stage_with_sort_and_add_fields
    pipeline:
      - Collection: books
      - Search:
          - SearchOptions:
              query: "science"
              sort:
                Ordering:
                  - Score: []
                  - DESCENDING
              add_fields:
                - AliasedExpression:
                  - Score: []
                  - "search_score"
    assert_results:
      - title: "Dune"
        author: "Frank Herbert"
        genre: "Science Fiction"
        published: 1965
        rating: 4.6
        tags:
          - politics
          - desert
          - adventure
        awards:
          hugo: true
          nebula: true
        title_selected: "Dune - Selected"
        search_score: 0.0
      - title: "The Hitchhiker's Guide to the Galaxy"
        author: "Douglas Adams"
        genre: "Science Fiction"
        published: 1979
        rating: 4.2
        tags:
          - comedy
          - space
          - adventure
        awards:
          hugo: true
          nebula: false
        title_selected: "The Hitchhiker's Guide to the Galaxy - Selected"
        search_score: 0.0
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - name: search
          options:
            query:
              functionValue:
                args:
                - stringValue: "science"
                name: document_matches
            sort:
              arrayValue:
                values:
                - mapValue:
                    fields:
                      direction:
                        stringValue: descending
                      expression:
                        functionValue:
                          name: score
            add_fields:
              mapValue:
                fields:
                  search_score:
                    functionValue:
                      name: score
  - description: expression_between
    pipeline:
      - Collection: books
      - Where:
          - FunctionExpression.between:
              - Field: published
              - Constant: 1950
              - Constant: 1970
      - Select:
        - title
      - Sort:
        - Ordering:
          - Field: title
          - ASCENDING
    assert_results:
      - title: Dune
      - title: One Hundred Years of Solitude
      - title: The Lord of the Rings
      - title: To Kill a Mockingbird
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - args:
          - functionValue:
              args:
              - functionValue:
                  args:
                  - fieldReferenceValue: published
                  - integerValue: '1950'
                  name: greater_than_or_equal
              - functionValue:
                  args:
                  - fieldReferenceValue: published
                  - integerValue: '1970'
                  name: less_than_or_equal
              name: and
          name: where
        - args:
          - mapValue:
              fields:
                title:
                  fieldReferenceValue: title
          name: select
        - args:
          - mapValue:
              fields:
                direction:
                  stringValue: ascending
                expression:
                  fieldReferenceValue: title
          name: sort
  - description: expression_geo_distance
    pipeline:
      - Collection: cities
      - Search:
          - SearchOptions:
              query:
                FunctionExpression.less_than_or_equal:
                  - FunctionExpression.geo_distance:
                     - Field: location
                     - GeoPoint: [37.0, -122.0]
                  - Constant: 150000.0
      - Select:
        - name
      - Sort:
        - Ordering:
          - Field: name
          - ASCENDING
    assert_results:
      - name: "San Francisco"
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /cities
          name: collection
        - name: search
          options:
            query:
              functionValue:
                args:
                - functionValue:
                    args:
                    - fieldReferenceValue: location
                    - geoPointValue:
                        latitude: 37.0
                        longitude: -122.0
                    name: geo_distance
                - doubleValue: 150000.0
                name: less_than_or_equal
        - args:
          - mapValue:
              fields:
                name:
                  fieldReferenceValue: name
          name: select
        - args:
          - mapValue:
              fields:
                direction:
                  stringValue: ascending
                expression:
                  fieldReferenceValue: name
          name: sort
  - description: search_stage_with_select_score
    pipeline:
      - Collection: books
      - Search:
          - SearchOptions:
              query: "science"
              select:
                - AliasedExpression:
                  - Score: []
                  - "search_score"
    assert_results:
      - search_score: 1.0
      - search_score: 0.5
    assert_proto:
      pipeline:
        stages:
        - args:
          - referenceValue: /books
          name: collection
        - name: search
          options:
            query:
              functionValue:
                args:
                - stringValue: "science"
                name: document_matches
            select:
              mapValue:
                fields:
                  search_score:
                    functionValue:
                      name: score
    name: score
