- description: search_sort_by_distance
  pipeline:
  - Collection: restaurants
  - Search:
    - SearchOptions:
        query:
          FunctionExpression.less_than_or_equal:
          - FunctionExpression.geo_distance:
            - Field: location
            - GeoPoint:
              - 39.6985
              - -105.024
          - Constant: 5600.0
        sort:
          Ordering:
          - FunctionExpression.geo_distance:
            - Field: location
            - GeoPoint:
              - 39.6985
              - -105.024
          - ASCENDING
  assert_results:
  - name: El Sol Tacos
    description: A vibrant street-side taco stand serving up quick, delicious, and
      traditional Mexican street food.
    location: GEOPOINT(39.6952, -105.0274)
    menu: <h3>Tacos ($3.50 each)</h3><ul><li>Al Pastor</li><li>Carne Asada</li><li>Pollo
      Asado</li><li>Nopales (Cactus)</li></ul><h3>Beverages</h3><ul><li>Horchata -
      $4</li><li>Mexican Coke - $3</li></ul>
    average_price_per_person: 12
  - name: Lotus Blossom Thai
    description: Authentic Thai cuisine featuring hand-crushed spices and traditional
      family recipes from the Chiang Mai region.
    location: GEOPOINT(39.7315, -104.9847)
    menu: <h3>Appetizers</h3><ul><li>Spring Rolls - $7</li><li>Chicken Satay - $9</li></ul><h3>Main
      Course</h3><ul><li>Pad Thai - $15</li><li>Green Curry - $16</li><li>Drunken
      Noodles - $15</li></ul>
    average_price_per_person: 22
  - name: Mile High Catch
    description: Freshly sourced seafood offering a wide variety of Pacific fish and
      Atlantic shellfish in an upscale atmosphere.
    location: GEOPOINT(39.7401, -104.9903)
    menu: <h3>From the Raw Bar</h3><ul><li>Oysters (Half Dozen) - $18</li><li>Lobster
      Cocktail - $22</li></ul><h3>Entrees</h3><ul><li>Pan-Seared Salmon - $28</li><li>King
      Crab Legs - $45</li><li>Fish and Chips - $19</li></ul>
    average_price_per_person: 45
  assert_proto:
    pipeline:
      stages:
      - args:
        - referenceValue: /restaurants
        name: collection
      - name: search
        options:
          query:
            functionValue:
              args:
              - functionValue:
                  args:
                  - fieldReferenceValue: location
                  - geoPointValue:
                      latitude: 39.6985
                      longitude: -105.024
                  name: geo_distance
              - doubleValue: 5600.0
              name: less_than_or_equal
          sort:
            arrayValue:
              values:
              - mapValue:
                  fields:
                    direction:
                      stringValue: ascending
                    expression:
                      functionValue:
                        args:
                        - fieldReferenceValue: location
                        - geoPointValue:
                            latitude: 39.6985
                            longitude: -105.024
                        name: geo_distance
