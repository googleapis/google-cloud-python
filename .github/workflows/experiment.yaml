name: Next-Gen CI Pipeline

on:
  pull_request:
    branches: [ main, preview ]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ==========================================
  # 1. DISCOVERY ENGINE (The Router)
  # ==========================================
  discover:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.build-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Detect Changed Packages
        id: changes
        uses: tj-actions/changed-files@v44
        with:
          files: packages/**
          dir_names: true               
          dir_names_max_depth: 2        

      - name: Build Bulletproof JSON Matrix
        id: build-matrix
        run: |
          RAW_LIST="${{ steps.changes.outputs.all_changed_files }}"
          
          if [[ -z "$RAW_LIST" ]]; then
            echo "No packages changed. Returning empty JSON array."
            JSON_ARRAY="[]"
          else
            # Convert string to strict JSON array
            JSON_ARRAY=$(echo -n "$RAW_LIST" | jq -R -c 'split(" ")')
            echo "Constructed JSON Array: $JSON_ARRAY"
          fi
          
          # SAFELY PASS MASSIVE JSON ARRAYS USING EOF
          echo "packages<<EOF" >> $GITHUB_OUTPUT
          echo "$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
  # ==========================================
  # 2. STATIC ANALYSIS
  # ==========================================
  static-checks:
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14" 
          enable-cache: true
      - name: Run Lint and MyPy
        run: |
          cd ${{ matrix.package }}
          export NOX_DEFAULT_VENV_BACKEND=uv
          export UV_VENV_SEED=1
          uvx --with 'nox[uv]' nox -s lint mypy lint_setup_py

  # ==========================================
  # 3. DOCUMENTATION BUILD
  # ==========================================
  docs-build:
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"
          enable-cache: true
      - name: Build Docs and DocFX
        run: |
          cd ${{ matrix.package }}
          export NOX_DEFAULT_VENV_BACKEND=uv
          export UV_VENV_SEED=1
          uvx --with 'nox[uv]' nox -s docs docfx

  # ==========================================
  # 4a. UNIT TESTS (Boundary: Python 3.9)
  # ==========================================
  unit-tests-3-9:
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.9"
          enable-cache: true
      - name: Execute Unit Tests (Python 3.9)
        run: |
          cd ${{ matrix.package }}
          export NOX_DEFAULT_VENV_BACKEND=uv
          export UV_VENV_SEED=1
          export UV_COMPILE_BYTECODE=1
          
          for i in 1 2 3; do
            if uvx --with 'nox[uv]' nox -s unit-3.9; then exit 0; fi
            sleep 5
          done
          exit 1

  # ==========================================
  # 4b. UNIT TESTS (Boundary: Python 3.14)
  # ==========================================
  unit-tests-3-14:
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Execute Unit Tests (Python 3.14)
        run: |
          cd ${{ matrix.package }}
          export NOX_DEFAULT_VENV_BACKEND=uv
          export UV_VENV_SEED=1
          export UV_COMPILE_BYTECODE=1
          
          for i in 1 2 3; do
            if uvx --with 'nox[uv]' nox -s unit-3.14; then exit 0; fi
            sleep 5
          done
          exit 1

  # ==========================================
  # 5. CORE DEPS FROM SOURCE
  # ==========================================
  unit-core-deps-from-source:
    needs: discover
    if: ${{ needs.discover.outputs.packages != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Execute Core Deps from Source Tests
        run: |
          cd ${{ matrix.package }}
          export NOX_DEFAULT_VENV_BACKEND=uv
          export UV_VENV_SEED=1
          export UV_COMPILE_BYTECODE=1
          uvx --with 'nox[uv]' nox -s "core_deps_from_source-3.14"

  # ==========================================
  # 6. THE GATEKEEPER
  # ==========================================
  presubmit-passed:
    if: always() 
    needs: 
      - discover
      - static-checks
      - docs-build
      - unit-tests-3-9
      - unit-tests-3-14
      - unit-core-deps-from-source
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate Pipeline Status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          exit 0
