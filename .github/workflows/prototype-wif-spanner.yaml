name: Prototype - WIF Spanner System Tests

on:
  workflow_dispatch: 

permissions:
  id-token: write 
  contents: read

jobs:
  system-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1047631029241/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
          service_account: 'github-ci-spanner-sa@omairn-project-sandbox-174760.iam.gserviceaccount.com'

      - name: Install uv and nox
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv pip install --system nox

      - name: Run Spanner System Tests (Warm Pool)
        run: |
          cd packages/google-cloud-spanner
          
          # Force the test suite to bypass creation and use our persistent instance
          export GOOGLE_CLOUD_TESTS_CREATE_SPANNER_INSTANCE="false"
          export GOOGLE_CLOUD_TESTS_SPANNER_INSTANCE="warm-ci-instance"
          
          nox -s system-3.12