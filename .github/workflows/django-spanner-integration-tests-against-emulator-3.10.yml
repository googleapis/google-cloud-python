on:
  pull_request:
    paths:
      - 'packages/django-google-spanner/**'
      - '.github/workflows/django-spanner-integration-tests-against-emulator-3.10.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/django-google-spanner/**'
      - '.github/workflows/django-spanner-integration-tests-against-emulator-3.10.yml'

defaults:
  run:
    working-directory: packages/django-google-spanner

name: Run Django Spanner integration tests against emulator 3.10
jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      run_django_spanner: ${{ steps.filter.outputs.django_spanner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            django_spanner:
              - 'packages/django-google-spanner/**'
              - '.github/workflows/django-spanner-integration-tests-against-emulator-3.10.yml'

  system-tests:
    needs: check_changes
    if: ${{ needs.check_changes.outputs.run_django_spanner == 'true' }}
    runs-on: ubuntu-latest

    services:
      emulator:
        image: gcr.io/cloud-spanner-emulator/emulator:latest
        ports:
          - 9010:9010
          - 9020:9020

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install nox
        run: python -m pip install nox
      - name: Run nox
        run: nox -s unit-3.10
        env:
          SPANNER_EMULATOR_HOST: localhost:9010
          GOOGLE_CLOUD_PROJECT: emulator-test-project
          GOOGLE_CLOUD_TESTS_CREATE_SPANNER_INSTANCE: true
