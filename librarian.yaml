language: python
version: v0.22.0
repo: googleapis/google-cloud-python
sources:
  googleapis:
    commit: e57bae6efbd075a925978a79bb9b997beb4ecc19
    sha256: 762523e55a4cd9f57c7e5a952dd76ca6041c0e1dd405c14b1d6cfb165e4730b1
default:
  output: packages
  tag_format: '{name}-v{version}'
  python:
    allowed_namespaces:
      - google.ads
      - google.apps
      - google.cloud
      - google.maps
      - google.shopping
      - google.devicesandservices
      - google.developers
    common_gapic_paths:
      - samples/generated_samples
      - tests/unit/gapic
      - testing
      - '{neutral-source}/__init__.py'
      - '{neutral-source}/gapic_version.py'
      - '{neutral-source}/py.typed'
      - tests/unit/__init__.py
      - tests/__init__.py
      - setup.py
      - noxfile.py
      - .coveragerc
      - .flake8
      - .repo-metadata.json
      - mypy.ini
      - README.rst
      - LICENSE
      - MANIFEST.in
      - docs/_static/custom.css
      - docs/_templates/layout.html
      - docs/conf.py
      - docs/index.rst
      - docs/multiprocessing.rst
      - docs/README.rst
      - docs/summary_overview.md
    library_type: GAPIC_AUTO
