language: python
version: v0.10.1
repo: googleapis/google-cloud-python
sources:
  googleapis:
    commit: db5d0d9e1a97acc63b787a67cd946e8244b77c88
    sha256: ed987c0ec2b5a6135dc30d7b17f180ff7ddd633fa7f2e28c38973e09e23e8cd2
release:
  ignored_changes:
    - .repo-metadata.json
    - docs/README.rst
default:
  output: packages
  tag_format: '{name}: v{version}'
  python:
    common_gapic_paths:
      - samples/generated_samples
      - tests/unit/gapic
      - testing
      - '{neutral-source}/__init__.py'
      - '{neutral-source}/gapic_version.py'
      - '{neutral-source}/py.typed'
      - tests/unit/__init__.py
      - tests/__init__.py
      - setup.py
      - noxfile.py
      - .coveragerc
      - .flake8
      - .repo-metadata.json
      - mypy.ini
      - README.rst
      - LICENSE
      - MANIFEST.in
      - docs/_static/custom.css
      - docs/_templates/layout.html
      - docs/conf.py
      - docs/index.rst
      - docs/multiprocessing.rst
      - docs/README.rst
      - docs/summary_overview.md
    library_type: GAPIC_AUTO
libraries:
  - name: google-area120-tables
    version: 0.14.0
    apis:
      - path: google/area120/tables/v1alpha1
    description_override: provides programmatic methods to the Area 120 Tables API.
    keep:
      - CHANGELOG.md
      - docs/CHANGELOG.md
    python:
      name_pretty_override: Area 120 Tables
      metadata_name_override: area120tables
      default_version: v1alpha1
